<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bingo Display</title>
    <link rel="stylesheet" href="/styles.css?v=2026-06-28-page-modes">
  </head>
  <body class="display-page">
    <main class="display-screen" aria-live="polite">
      <section id="numberView" class="number-view">
        <p class="display-pattern"><span id="displayPattern" class="display-pattern-value">Regular Bingo</span></p>
        <div class="display-content">
          <div class="number-column">
            <div id="currentNumberBadge" class="current-number-badge">
              <h1 id="currentNumber" class="current-number">Ready</h1>
            </div>
          </div>

          <aside class="pattern-board-panel" aria-label="Winning pattern visual">
            <div id="patternBoardTitle" class="pattern-board-title">Regular Bingo</div>
            <div class="pattern-board-letters" aria-hidden="true">
              <span>B</span>
              <span>I</span>
              <span>N</span>
              <span>G</span>
              <span>O</span>
            </div>
            <div id="patternBoard" class="pattern-board"></div>
          </aside>
        </div>
        <div id="recentCalls" class="recent-calls" aria-label="Last 10 called numbers"></div>
        <section id="calledBoard" class="called-board" aria-label="Called balls board"></section>
      </section>

      <section id="bingoView" class="bingo-view hidden">
        <div id="fireworks" class="fireworks" aria-hidden="true">
          <span class="loop-firework"></span>
          <span class="loop-firework"></span>
          <span class="loop-firework"></span>
          <span class="loop-firework"></span>
          <span class="loop-firework"></span>
          <span class="loop-firework"></span>
        </div>
        <h1>BINGO!</h1>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/display.js?v=2026-06-28-page-modes"></script>
  </body>
</html>
